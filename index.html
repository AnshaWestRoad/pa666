<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="referrer" content="no-referrer">
<title>不凡成就非凡</title>

<style>

body{
margin:0;
padding:0;
font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
color:white;
background-image:url("https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESB6VpwCokhdnwVQEplRkMjE9BIpn95wACMy8AAiLeAAFW5H3ffXkijhs6BA.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* 半透明模糊遮罩层 */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
backdrop-filter:blur(8px);
background:linear-gradient(
rgba(0,0,0,0.35),
rgba(0,0,0,0.45)
);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
z-index:1;
}

/* 标题动画 */

.title{
font-size:3.2rem;
font-weight:bold;
margin-bottom:25px;

background:linear-gradient(
90deg,
#00eaff,
#0099ff,
#0044ff
);

background-size:200% auto;

color:transparent;
background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 6px #00ffff,
0 0 10px #0099ff;

animation:glow 4s linear infinite;
}

/* 按钮容器 */

.buttons{
display:flex;
flex-direction:column;
gap:18px;
}

/* 按钮设计 */

.btn{

padding:14px 30px;
font-size:1.2rem;
font-weight:bold;

color:white;
text-decoration:none;

border-radius:12px;

background:rgba(0,0,0,0.55);

border:1px solid rgba(0,200,255,0.5);

box-shadow:
0 0 12px rgba(0,200,255,0.4);

transition:all .25s ease;
}

/* PC悬停动画 */

.btn:hover{

transform:scale(1.06);

box-shadow:
0 0 25px #00e0ff,
0 0 50px #00aaff;
}

/* 手机点击动画 */

.btn:active{

transform:scale(.96);
}

/* 底部运行时间栏 */

.footer{

position:fixed;
bottom:0;
width:100%;

text-align:center;

background:rgba(0,0,0,0.45);

padding:6px 0;

font-size:13px;

backdrop-filter:blur(4px);

z-index:999;
}

/* 标题渐变动画 */

@keyframes glow{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* 手机适配 */

@media(max-width:600px){

.title{
font-size:2rem;
}

.btn{
font-size:1rem;
padding:10px 22px;
}

.footer{
font-size:11px;
padding:4px 0;
}

}

</style>
</head>

<body>

<div class="overlay">

<h1 class="title">人生就是博</h1>

<div class="buttons">

<a href="https://38.181.23.88:60005/#/link?join=uxwydHsyeCy2hYO9%2BuB5Wg%3D%3D"
class="btn"
target="_blank">
C7娱乐
</a>

<a href="https://www.d3788.com"
class="btn"
target="_blank">
尊龙凯时
</a>

<a href="https://www.eibedxdy.com/?palcode=1011299457"
class="btn"
target="_blank">
邮箱注册
</a>

</div>

</div>

<div class="footer" id="runtime"></div>

<script>

const launchDate=new Date("2017-01-01T00:00:00Z");

function updateRunTime(){

const now=new Date();

const elapsed=Math.floor((now-launchDate)/1000);

const days=Math.floor(elapsed/(3600*24));

const hours=Math.floor((elapsed%(3600*24))/3600);

const minutes=Math.floor((elapsed%3600)/60);

const seconds=elapsed%60;

document.getElementById("runtime").innerText=
`本站稳定运行 ${days} 天 ${hours} 小时 ${minutes} 分 ${seconds} 秒`;

}

setInterval(updateRunTime,1000);

updateRunTime();

</script>

</body>
</html>
